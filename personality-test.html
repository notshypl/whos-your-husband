<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>这位老公喜欢你的追星模式</title>
<style>
:root {
  --bg: #1a1028;
  --card: #241838;
  --accent: #e892b0;
  --accent2: #c77dff;
  --text: #e8dff0;
  --muted: #9a8aaf;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  background-image: radial-gradient(ellipse at top, #2d1a4a 0%, #1a1028 60%);
  color: var(--text);
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.container { width: 100%; max-width: 640px; }

.stage { display: none; }
.stage.active { display: block; }

/* ====== Home ====== */
.home-card {
  background: var(--card);
  border-radius: 20px;
  padding: 48px 36px;
  text-align: center;
  border: 1px solid #3d2a5a;
  box-shadow: 0 8px 40px rgba(199,125,255,0.1);
}

.home-card h1 {
  font-size: 2.2rem;
  background: linear-gradient(135deg, #e892b0, #c77dff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}

.home-card .subtitle { color: var(--muted); font-size: 0.95rem; margin-bottom: 32px; }

.home-card .desc {
  text-align: left; font-size: 0.95rem; line-height: 1.8;
  color: #c0b0d0; margin-bottom: 36px;
}

.home-card .desc p { margin-bottom: 8px; }

.btn {
  display: inline-block; padding: 13px 44px; font-size: 1.05rem;
  background: linear-gradient(135deg, #c77dff, #e892b0);
  color: #fff; border: none; border-radius: 25px;
  cursor: pointer; transition: opacity 0.2s, transform 0.1s;
  font-weight: 600; letter-spacing: 1px;
}

.btn:hover { opacity: 0.9; }
.btn:active { transform: scale(0.97); }

.btn-secondary { background: #3d2a5a; }
.btn-secondary:hover { background: #4d3a6a; }

/* ====== Quiz ====== */
.quiz-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
}

.progress-text { font-size: 0.9rem; color: var(--muted); }

.progress-bar {
  width: 100%; height: 5px; background: #3d2a5a;
  border-radius: 3px; margin-bottom: 24px; overflow: hidden;
}

.progress-fill {
  height: 100%; background: linear-gradient(90deg, #c77dff, #e892b0);
  border-radius: 3px; transition: width 0.3s ease;
}

.question-card {
  background: var(--card); border-radius: 20px; padding: 32px 28px;
  border: 1px solid #3d2a5a;
}

.question-num {
  font-size: 0.8rem; color: #c77dff; margin-bottom: 14px; font-weight: bold;
  letter-spacing: 2px; text-transform: uppercase;
}

.question-text {
  font-size: 1.1rem; line-height: 1.8; margin-bottom: 24px;
  color: #f0e8f8;
}

.options { display: flex; flex-direction: column; gap: 10px; }

.option {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 16px; background: #2d1d44;
  border: 2px solid transparent; border-radius: 12px;
  cursor: pointer; transition: all 0.2s; font-size: 0.9rem;
  line-height: 1.55; color: #c8b8d8; text-align: left;
}

.option:hover { background: #352550; }
.option.selected {
  border-color: #c77dff;
  background: #352250;
  color: #f0e8f8;
}

.option .letter {
  width: 26px; height: 26px; border-radius: 50%;
  border: 2px solid #5a4a7a; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; font-size: 0.8rem;
  font-weight: bold; color: #9a8aaf; transition: all 0.2s;
}

.option.selected .letter { border-color: #c77dff; color: #c77dff; background: #3d2060; }

.quiz-nav {
  display: flex; justify-content: space-between; margin-top: 24px;
}

/* ====== Result ====== */
.result-card {
  background: var(--card); border-radius: 20px; padding: 36px 28px;
  border: 1px solid #3d2a5a; text-align: center;
}

.idol-sparkle {
  font-size: 0.85rem; color: #c77dff; letter-spacing: 3px; margin-bottom: 4px;
}

.idol-name {
  font-size: 2.6rem; font-weight: bold;
  background: linear-gradient(135deg, #f0c0d0, #d0a0ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 4px; letter-spacing: 4px;
}

.idol-label {
  font-size: 0.9rem; color: #b098c8; margin-bottom: 24px;
}

.husband-card {
  background: linear-gradient(135deg, #2d1848, #351d50);
  border: 1px solid #5a3a80; border-radius: 16px;
  padding: 24px 20px; margin-bottom: 28px; text-align: left;
}

.husband-card .label {
  font-size: 0.8rem; color: #c77dff; letter-spacing: 2px; margin-bottom: 8px;
}

.husband-card .traits {
  font-size: 0.95rem; line-height: 1.8; color: #d8c8e8;
}

.husband-card .lovestory {
  margin-top: 16px; padding-top: 16px; border-top: 1px solid #3d2a5a;
  font-size: 0.9rem; line-height: 1.8; color: #c0a8d8;
}

.chart-section { margin-bottom: 24px; }

.chart-section h3 {
  text-align: left; margin-bottom: 14px; font-size: 0.95rem; color: #c0b0d0;
}

.chart {
  display: flex; align-items: flex-end; justify-content: space-between;
  height: 180px; padding-top: 10px; border-bottom: 1px solid #3d2a5a;
}

.bar-wrapper { display: flex; flex-direction: column; align-items: center; flex: 1; max-width: 55px; }

.bar-label { font-size: 0.7rem; color: var(--muted); margin-bottom: 4px; }

.bar {
  width: 30px; border-radius: 4px 4px 0 0; transition: height 0.6s ease; min-height: 4px;
  background: linear-gradient(to top, #c77dff, #e892b0);
}

.bar-value { font-size: 0.7rem; color: #b098c8; margin-top: 4px; }

.chart-legend {
  display: flex; flex-wrap: wrap; gap: 6px 14px; justify-content: center;
  margin-top: 10px; font-size: 0.75rem; color: #9a8aaf;
}

.runner-up {
  font-size: 0.85rem; color: #9a8aaf; margin-bottom: 24px; line-height: 1.6;
}

.runner-up strong { color: #c77dff; }

/* ====== Ending Overlay ====== */
.ending-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: #fce4ec;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 1s ease;
}

.ending-overlay.fade-out {
  opacity: 0; pointer-events: none;
}

.wave-text {
  font-size: 1.25rem;
  color: #c96d82;
  text-align: center;
  padding: 40px;
  line-height: 2.2;
  letter-spacing: 2px;
  font-weight: 500;
  max-width: 480px;
  animation: waveFloat 5s ease-in-out forwards;
}

@keyframes waveFloat {
  0%   { opacity: 0; transform: translateY(36px); }
  12%  { opacity: 1; transform: translateY(0); }
  24%  { opacity: 0.5; transform: translateY(-10px); }
  36%  { opacity: 1; transform: translateY(0); }
  48%  { opacity: 0.6; transform: translateY(-6px); }
  60%  { opacity: 0.9; transform: translateY(0); }
  72%  { opacity: 0.4; transform: translateY(-4px); }
  84%  { opacity: 0.8; transform: translateY(0); }
  92%  { opacity: 0.3; transform: translateY(-2px); }
  100% { opacity: 0; transform: translateY(24px); }
}

@media (max-width: 480px) {
  .home-card { padding: 32px 20px; }
  .question-card { padding: 24px 16px; }
  .result-card { padding: 24px 16px; }
  .idol-name { font-size: 1.8rem; letter-spacing: 2px; }
  .bar { width: 22px; }
  .chart { height: 140px; }
  .option { font-size: 0.85rem; padding: 12px 14px; }
}
</style>
</head>
<body>

<div class="container">

  <!-- ====== Home ====== -->
  <div class="stage active" id="stage-home">
    <div class="home-card">
      <h1>这位老公喜欢你的追星模式</h1>
      <div class="subtitle">一份非常认真（但也非常不正经）的梦女适配度测试</div>
      <div class="desc">
        <p>20道沉浸式场景题，深入你的追星人格底层代码。</p>
        <p>没有正确答案，只有你的真心——和你命中注定的那位（或者那几位）老公。</p>
        <p>请放松，诚实作答。测试约需 5 分钟。</p>
      </div>
      <button class="btn" onclick="startQuiz()">寻找我的老公</button>
    </div>
  </div>

  <!-- ====== Quiz ====== -->
  <div class="stage" id="stage-quiz">
    <div class="quiz-header">
      <span class="progress-text" id="progressText">1 / 20</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="question-card">
      <div class="question-num" id="questionNum"></div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="options"></div>
    </div>
    <div class="quiz-nav">
      <button class="btn btn-secondary" id="btnPrev" onclick="prevQuestion()">上一题</button>
      <button class="btn" id="btnNext" onclick="nextQuestion()">下一题</button>
    </div>
  </div>

  <!-- ====== Ending Overlay ====== -->
  <div class="ending-overlay" id="endingOverlay" style="display:none;">
    <div class="wave-text" id="waveText"></div>
  </div>

  <!-- ====== Result ====== -->
  <div class="stage" id="stage-result">
    <div class="result-card">
      <div class="idol-sparkle">✦ 你的命定老公 ✦</div>
      <div class="idol-name" id="idolName"></div>
      <div class="idol-label" id="idolGroup"></div>

      <div class="husband-card">
        <div class="label">老公属性</div>
        <div class="traits" id="husbandTraits"></div>
        <div class="lovestory" id="loveStory"></div>
      </div>

      <div class="chart-section">
        <h3>你的梦女维度画像</h3>
        <div class="chart" id="chart"></div>
        <div class="chart-legend" id="chartLegend"></div>
      </div>

      <div class="runner-up" id="runnerUp"></div>
      <button class="btn" onclick="resetTest()">重新测试</button>
    </div>
  </div>

</div>

// ==================== 维度名称 ====================
const dimNames = ['年上年下', '浪漫风格', '相处黏度', '性格匹配', '精神需求'];
const dimKeys = ['A','B','C','D','E'];

// ==================== 状态 ====================
let currentIndex = 0;
let answers = new Array(questions.length).fill(-1);

// ==================== 阶段切换 ====================
function showStage(id) {
  document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
  document.getElementById('stage-' + id).classList.add('active');
}

// ==================== 开始测试 ====================
function startQuiz() {
  currentIndex = 0;
  answers = new Array(questions.length).fill(-1);
  showStage('quiz');
  renderQuestion();
}

// ==================== 渲染题目 ====================
function renderQuestion() {
  const q = questions[currentIndex];
  document.getElementById('questionNum').textContent = `QUESTION ${q.id}`;
  document.getElementById('questionText').textContent = q.text;
  document.getElementById('progressText').textContent = `${currentIndex + 1} / ${questions.length}`;
  document.getElementById('progressFill').style.width = ((currentIndex + 1) / questions.length * 100) + '%';

  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  btnPrev.style.visibility = currentIndex === 0 ? 'hidden' : 'visible';
  btnNext.textContent = currentIndex === questions.length - 1 ? '揭晓结果' : '下一题';

  const optionsDiv = document.getElementById('options');
  optionsDiv.innerHTML = '';

  const letters = ['A', 'B', 'C', 'D'];
  const saved = answers[currentIndex];

  q.options.forEach((opt, idx) => {
    const div = document.createElement('div');
    div.className = 'option' + (saved === idx ? ' selected' : '');
    div.innerHTML = `<span class="letter">${letters[idx]}</span><span>${opt.text}</span>`;
    div.addEventListener('click', () => selectOption(idx));
    optionsDiv.appendChild(div);
  });
}

function selectOption(idx) {
  answers[currentIndex] = idx;
  document.querySelectorAll('.option').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
}

// ==================== 导航 ====================
function nextQuestion() {
  if (answers[currentIndex] === -1) {
    alert('请先选择一个选项哦~');
    return;
  }
  if (currentIndex === questions.length - 1) {
    showEnding();
  } else {
    currentIndex++;
    renderQuestion();
  }
}

function showEnding() {
  // 隐藏quiz阶段
  document.getElementById('stage-quiz').classList.remove('active');
  // 显示结尾动画
  const overlay = document.getElementById('endingOverlay');
  const waveText = document.getElementById('waveText');
  waveText.textContent = '不断追逐的过程中也请善待付出全部真心的自己';
  overlay.style.display = 'flex';
  // 强制回流后重置动画
  waveText.style.animation = 'none';
  waveText.offsetHeight;
  waveText.style.animation = 'waveFloat 5s ease-in-out forwards';
  // 动画结束后跳转结果
  setTimeout(() => {
    overlay.classList.add('fade-out');
    setTimeout(() => {
      overlay.style.display = 'none';
      overlay.classList.remove('fade-out');
      showResult();
    }, 1000);
  }, 5000);
}

function prevQuestion() {
  if (currentIndex > 0) {
    currentIndex--;
    renderQuestion();
  }
}

// ==================== 结果计算 ====================
function calcScores() {
  const totals = { A:0, B:0, C:0, D:0, E:0 };
  questions.forEach((q, i) => {
    const choice = q.options[answers[i]];
    totals.A += choice.scores[0];
    totals.B += choice.scores[1];
    totals.C += choice.scores[2];
    totals.D += choice.scores[3];
    totals.E += choice.scores[4];
  });
  // 根据实际题目数据动态计算每维最大可能得分
  const maxes = { A:0, B:0, C:0, D:0, E:0 };
  questions.forEach(q => {
    let mA=0,mB=0,mC=0,mD=0,mE=0;
    q.options.forEach(opt => {
      mA = Math.max(mA, opt.scores[0]);
      mB = Math.max(mB, opt.scores[1]);
      mC = Math.max(mC, opt.scores[2]);
      mD = Math.max(mD, opt.scores[3]);
      mE = Math.max(mE, opt.scores[4]);
    });
    maxes.A += mA; maxes.B += mB; maxes.C += mC; maxes.D += mD; maxes.E += mE;
  });
  // 归一化到1-4
  const norm = {};
  for (const k of dimKeys) {
    norm[k] = Math.round(totals[k] / Math.max(maxes[k], 1) * 400) / 100;
    norm[k] = Math.max(0.5, Math.min(4, norm[k]));
  }
  return norm;
}

function findBestMatch(user) {
  // 中心化：减去个人均值，只比较维度间相对高低的"形状"
  const userMean = (user.A + user.B + user.C + user.D + user.E) / 5;
  const u = {
    A: user.A - userMean,
    B: user.B - userMean,
    C: user.C - userMean,
    D: user.D - userMean,
    E: user.E - userMean,
  };

  let best = null, bestDist = Infinity;
  const all = [];
  for (const [name, prof] of Object.entries(idolProfiles)) {
    const idolMean = (prof.A + prof.B + prof.C + prof.D + prof.E) / 5;
    const d = Math.sqrt(
      Math.pow(u.A - (prof.A - idolMean), 2) +
      Math.pow(u.B - (prof.B - idolMean), 2) +
      Math.pow(u.C - (prof.C - idolMean), 2) +
      Math.pow(u.D - (prof.D - idolMean), 2) +
      Math.pow(u.E - (prof.E - idolMean), 2)
    );
    all.push({ name, dist: d, group: prof.group });
    if (d < bestDist) { bestDist = d; best = { name, dist: d, group: prof.group }; }
  }
  all.sort((a,b) => a.dist - b.dist);
  const runners = all.slice(1, 4).map(a => a.name);
  return { best, runners };
}

function showResult() {
  const userScores = calcScores();
  const { best, runners } = findBestMatch(userScores);
  const res = idolResults[best.name] || { traits:'暂无数据', story:'暂无数据' };

  document.getElementById('idolName').textContent = best.name;
  document.getElementById('idolGroup').textContent = best.group;
  document.getElementById('husbandTraits').textContent = res.traits;
  document.getElementById('loveStory').textContent = res.story;

  renderChart(userScores);

  document.getElementById('runnerUp').innerHTML =
    '备选老公：<strong>' + runners.join('</strong> / <strong>') + '</strong><br>——也都和你不相上下，但命中注定只有一个。';

  showStage('result');
}

// ==================== 柱状图 ====================
function renderChart(scores) {
  const chart = document.getElementById('chart');
  const legend = document.getElementById('chartLegend');
  const maxScore = Math.max(...Object.values(scores), 0.5);

  chart.innerHTML = '';
  legend.innerHTML = '';

  dimKeys.forEach((k, i) => {
    const pct = Math.round(scores[k] / Math.max(maxScore, 0.01) * 100);
    const wrapper = document.createElement('div');
    wrapper.className = 'bar-wrapper';
    wrapper.innerHTML = `
      <div class="bar-value">${scores[k].toFixed(1)}</div>
      <div class="bar" style="height:${pct}%"></div>
      <div class="bar-label">${dimNames[i]}</div>
    `;
    chart.appendChild(wrapper);

    const item = document.createElement('span');
    item.className = 'legend-item';
    item.textContent = dimNames[i] + ': ' + (scores[k] < 2 ? '(偏低)' : scores[k] > 3 ? '(偏高)' : '(中等)');
    legend.appendChild(item);
  });
}

// ==================== 重置 ====================
function resetTest() {
  answers = new Array(questions.length).fill(-1);
  currentIndex = 0;
  showStage('home');
}
